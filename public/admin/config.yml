# ============================================================
# DECAP CMS CONFIGURATION FOR PET-GOTOPRO
# ============================================================
# This file tells the content manager what kinds of content
# exist on the site and what fields they need. Edit this file
# when you want to add new content types or fields.
# ============================================================

backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

# Site URL for previews
site_url: https://pet-gotopro.com
display_url: https://pet-gotopro.com
logo_url: https://pet-gotopro.com/pet-gotopro-logo.png

# ============================================================
# COLLECTIONS — Each collection is a content type
# ============================================================

collections:

  # ----------------------------------------------------------
  # BREED GUIDES (cats & dogs)
  # ----------------------------------------------------------
  - name: "cat-breed-guides"
    label: "🐈 Cat Breed Guides"
    label_singular: "Cat Breed Guide"
    folder: "src/content/guides/cats/breeds"
    create: true
    slug: "{{slug}}"
    media_folder: "images"
    public_folder: "./images"
    preview_path: "guides/cats/{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string", hint: "Article headline — appears at top of page and in Google search results"}
      - {label: "SEO Description", name: "description", widget: "text", hint: "Short summary that appears in Google search results (aim for 150-160 characters)"}
      - {label: "Pet Category", name: "pet", widget: "hidden", default: "cats"}
      - {label: "Publish Date", name: "pubDate", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string", default: "editorial-team"}
      - {label: "Featured on Homepage", name: "featured", widget: "boolean", default: false}
      - {label: "Hero Image", name: "heroImage", widget: "image", hint: "The big image at the top of the article"}
      - {label: "Hero Image Alt Text", name: "heroImageAlt", widget: "string", hint: "Brief description of the image for accessibility/SEO"}
      - {label: "Tags", name: "tags", widget: "list", default: ["breed-guide", "cats"]}
      - {label: "Article Body", name: "body", widget: "markdown", hint: "Write your article here. Drag images directly into the editor."}

  - name: "dog-breed-guides"
    label: "🐕 Dog Breed Guides"
    label_singular: "Dog Breed Guide"
    folder: "src/content/guides/dogs/breeds"
    create: true
    slug: "{{slug}}"
    media_folder: "images"
    public_folder: "./images"
    preview_path: "guides/dogs/{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "SEO Description", name: "description", widget: "text"}
      - {label: "Pet Category", name: "pet", widget: "hidden", default: "dogs"}
      - {label: "Publish Date", name: "pubDate", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string", default: "editorial-team"}
      - {label: "Featured on Homepage", name: "featured", widget: "boolean", default: false}
      - {label: "Hero Image", name: "heroImage", widget: "image"}
      - {label: "Hero Image Alt Text", name: "heroImageAlt", widget: "string"}
      - {label: "Tags", name: "tags", widget: "list", default: ["breed-guide", "dogs"]}
      - {label: "Article Body", name: "body", widget: "markdown"}

  # ----------------------------------------------------------
  # PRODUCT REVIEWS
  # ----------------------------------------------------------
  - name: "reviews"
    label: "⭐ Product Reviews"
    label_singular: "Product Review"
    folder: "src/content/reviews"
    create: true
    slug: "{{slug}}"
    media_folder: "images"
    public_folder: "./images"
    preview_path: "reviews/{{pet}}/{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "SEO Description", name: "description", widget: "text"}
      - {label: "Pet Category", name: "pet", widget: "select", options: ["dogs", "cats", "birds", "reptiles", "aquatics", "small-animals"]}
      - {label: "Publish Date", name: "pubDate", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string", default: "editorial-team"}
      - {label: "Featured on Homepage", name: "featured", widget: "boolean", default: false}
      - {label: "Hero Image", name: "heroImage", widget: "image"}
      - {label: "Hero Image Alt Text", name: "heroImageAlt", widget: "string"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Article Body", name: "body", widget: "markdown"}

  # ----------------------------------------------------------
  # CARE GUIDES (general, not breed-specific)
  # ----------------------------------------------------------
  - name: "guides"
    label: "📖 Care Guides"
    label_singular: "Care Guide"
    folder: "src/content/guides"
    create: true
    slug: "{{slug}}"
    media_folder: "images"
    public_folder: "./images"
    preview_path: "guides/{{pet}}/{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "SEO Description", name: "description", widget: "text"}
      - {label: "Pet Category", name: "pet", widget: "select", options: ["dogs", "cats", "birds", "reptiles", "aquatics", "small-animals"]}
      - {label: "Publish Date", name: "pubDate", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string", default: "editorial-team"}
      - {label: "Featured on Homepage", name: "featured", widget: "boolean", default: false}
      - {label: "Hero Image", name: "heroImage", widget: "image"}
      - {label: "Hero Image Alt Text", name: "heroImageAlt", widget: "string"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Article Body", name: "body", widget: "markdown"}

  # ----------------------------------------------------------
  # NEWS POSTS
  # ----------------------------------------------------------
  - name: "news"
    label: "📰 News & Recalls"
    label_singular: "News Post"
    folder: "src/content/news"
    create: true
    slug: "{{slug}}"
    media_folder: "images"
    public_folder: "./images"
    preview_path: "news/{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "SEO Description", name: "description", widget: "text"}
      - {label: "Publish Date", name: "pubDate", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string", default: "editorial-team"}
      - {label: "Hero Image", name: "heroImage", widget: "image"}
      - {label: "Hero Image Alt Text", name: "heroImageAlt", widget: "string"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Article Body", name: "body", widget: "markdown"}
